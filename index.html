<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferretería Don Stefano</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --sidebar:#1C2333;
      --sidebar2:#252E42;
      --sidebar-active:#D0312D;
      --page:#F0F2F7;
      --white:#FFFFFF;
      --card:#FFFFFF;
      --border:#E2E6EF;
      --border2:#CDD2DF;
      --text:#1A1F2E;
      --text2:#5A6278;
      --text3:#9BA3B8;
      --radius:10px;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      --yellow:#F5C400;
      --red:#D0312D;
      --green:#2E7D32;
      --orange:#E65100;
      --blue:#1565C0;
      --purple:#5E35B1;
    }
    body{font-family:var(--font);background:var(--page);color:var(--text);min-height:100vh;display:flex;}

    /* SIDEBAR */
    .sidebar{width:215px;min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:50;}
    .sb-brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .sb-logo{display:flex;align-items:center;gap:10px;}
    .sb-icon{width:38px;height:38px;border-radius:8px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:18px;color:#111;font-weight:800;flex-shrink:0;}
    .sb-name{font-size:13px;font-weight:800;color:#fff;letter-spacing:0.3px;line-height:1.2;}
    .sb-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px;}
    .sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
    .sb-label{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.3);text-transform:uppercase;padding:12px 8px 5px;}
    .sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);transition:all 0.15s;margin-bottom:2px;}
    .sb-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
    .sb-item.active{background:var(--sidebar-active);color:#fff;font-weight:700;}
    .sb-icon-nav{font-size:17px;}
    .sb-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,0.08);}
    .sb-time{font-size:11px;color:rgba(255,255,255,0.3);text-align:center;}
    .sb-total{font-size:12px;color:rgba(255,255,255,0.5);text-align:center;margin-top:4px;}
    .sb-total span{color:var(--yellow);font-weight:700;}

    /* MAIN */
    .main{margin-left:215px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:15px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .tb-title{font-size:20px;font-weight:800;color:var(--text);}
    .tb-date{font-size:12px;color:var(--text3);margin-top:2px;}
    .btn-new{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background 0.15s;white-space:nowrap;}
    .btn-new:hover{background:#B02828;}
    .content{padding:20px 24px;flex:1;}

    /* METRIC CARDS */
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
    .mc{border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;color:#fff;}
    .mc-red{background:linear-gradient(135deg,#C0392B,#96281B);}
    .mc-orange{background:linear-gradient(135deg,#E65100,#BF360C);}
    .mc-purple{background:linear-gradient(135deg,#6A1B9A,#4A148C);}
    .mc-navy{background:linear-gradient(135deg,#1C2333,#2C3550);}
    .mc-blue{background:linear-gradient(135deg,#1565C0,#0D47A1);}
    .mc-green{background:linear-gradient(135deg,#2E7D32,#1B5E20);}
    .mc-yellow{background:linear-gradient(135deg,#F9A825,#E65100);}
    .mc-teal{background:linear-gradient(135deg,#00695C,#004D40);}
    .mc-label{font-size:10px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;opacity:0.75;margin-bottom:8px;}
    .mc-val{font-size:24px;font-weight:800;line-height:1;}
    .mc-sub{font-size:11px;opacity:0.6;margin-top:5px;}
    .mc-bg-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:52px;opacity:0.12;}

    /* ALERTS */
    .alert-area{margin-bottom:16px;}
    .alert{border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;margin-bottom:7px;}
    .a-red{background:#FDECEA;border:1px solid #FFCDD2;color:#C62828;}
    .a-orange{background:#FFF3E0;border:1px solid #FFE0B2;color:#BF360C;}

    /* SEARCH */
    .search-wrap{position:relative;margin-bottom:12px;}
    .search-input{width:100%;padding:9px 12px 9px 34px;border-radius:8px;border:1px solid var(--border2);background:var(--white);font-size:13px;font-family:var(--font);color:var(--text);}
    .search-input::placeholder{color:var(--text3);}
    .search-input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(208,49,45,0.1);}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}

    /* SECTION */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
    .section-title{font-size:14px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:0.3px;}
    .filter-row{display:flex;gap:5px;flex-wrap:wrap;}
    .filter-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--white);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all 0.15s;}
    .filter-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
    .filter-btn:hover:not(.active){background:var(--page);color:var(--text);}

    /* TABLE */
    .table-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
    thead{background:var(--page);}
    th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--text3);letter-spacing:0.7px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
    td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#FAFBFF;}
    .prod-name{font-weight:700;}
    .prod-cat{font-size:11px;color:var(--text3);margin-top:1px;}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
    .b-ok{background:#E8F5E9;color:#2E7D32;}
    .b-low{background:#FFF3E0;color:#E65100;}
    .b-crit{background:#FDECEA;color:#C62828;}
    .dot{width:6px;height:6px;border-radius:50%;}
    .d-ok{background:#43A047;} .d-low{background:#FB8C00;} .d-crit{background:#E53935;}
    .progress-bar{height:5px;border-radius:4px;background:var(--border);overflow:hidden;}
    .pf-ok{background:#43A047;height:100%;border-radius:4px;}
    .pf-low{background:#FB8C00;height:100%;border-radius:4px;}
    .pf-crit{background:#E53935;height:100%;border-radius:4px;}
    .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border2);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all 0.15s;font-size:15px;}
    .icon-btn:hover{background:var(--page);color:var(--text);}
    .icon-btn.del:hover{color:#C62828;border-color:#FFCDD2;background:#FDECEA;}
    .actions-col{display:flex;gap:5px;}
    .empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px;}

    /* VENTA */
    .venta-layout{display:grid;grid-template-columns:1fr 290px;gap:16px;align-items:start;}
    @media(max-width:640px){.venta-layout{grid-template-columns:1fr;}.sidebar{display:none;}.main{margin-left:0;}}
    .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:9px;max-height:440px;overflow-y:auto;}
    .prod-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.15s;}
    .prod-card:hover{border-color:var(--red);box-shadow:0 2px 8px rgba(208,49,45,0.12);}
    .prod-card.out{opacity:0.4;cursor:not-allowed;}
    .pc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3;}
    .pc-cat{font-size:11px;color:var(--text3);margin-bottom:6px;}
    .pc-price{font-size:16px;font-weight:800;color:var(--red);}
    .pc-stock{font-size:11px;color:var(--text3);margin-top:2px;}
    .pc-stock.warn{color:#E65100;font-weight:600;} .pc-stock.crit{color:#C62828;font-weight:600;}
    .cart-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;position:sticky;top:10px;}
    .cart-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
    .cart-badge{background:var(--red);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;}
    .cart-empty{font-size:13px;color:var(--text3);text-align:center;padding:1.5rem 0;}
    .cart-item{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--border);}
    .cart-item:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
    .ci-name{flex:1;font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
    .ci-price{font-size:11px;color:var(--text3);}
    .qty-ctrl{display:flex;align-items:center;gap:3px;}
    .qty-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border2);background:var(--page);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:var(--font);}
    .qty-btn:hover{border-color:var(--red);color:var(--red);}
    .qty-val{font-size:13px;font-weight:800;min-width:20px;text-align:center;}
    .cart-remove{width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;}
    .cart-remove:hover{color:#C62828;}
    .cart-divider{height:1px;background:var(--border);margin:10px 0;}
    .cart-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:var(--text2);}
    .cart-row .val{font-weight:700;color:var(--text);}
    .cart-row.gan .val{color:#2E7D32;font-weight:700;}
    .cart-row.total .lbl{font-weight:800;color:var(--text);font-size:14px;}
    .cart-row.total .val{color:var(--red);font-size:18px;font-weight:800;}
    .btn-vender{width:100%;padding:11px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);margin-top:12px;transition:background 0.15s;}
    .btn-vender:hover{background:#B02828;}
    .btn-limpiar{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font);margin-top:7px;}
    .btn-limpiar:hover{background:var(--page);}

    /* HISTORIAL */
    .hi-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:9px;}
    .hi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-wrap:wrap;gap:6px;}
    .hi-id{font-size:12px;color:var(--text3);font-weight:600;}
    .hi-date{font-size:12px;color:var(--text3);}
    .hi-total{font-size:16px;font-weight:800;color:var(--red);}
    .hi-gan{font-size:12px;color:#2E7D32;font-weight:700;}
    .hi-tag{display:inline-block;background:var(--page);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--text2);margin-right:4px;margin-top:4px;}
    .no-ventas{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px;}
    .btn-del-venta{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;border:1px solid #FFCDD2;background:#FDECEA;color:#C62828;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;}
    .btn-del-venta:hover{background:#FFCDD2;}

    /* PIZARRON */
    .pizarron-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:700px){.pizarron-wrap{grid-template-columns:1fr;}}
    .piz-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;}
    .piz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .piz-title{font-size:13px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:0.3px;}
    .piz-title i{color:var(--red);}
    .note-input-row{display:flex;gap:7px;margin-bottom:12px;}
    .note-input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--page);font-size:13px;font-family:var(--font);color:var(--text);resize:none;}
    .note-input::placeholder{color:var(--text3);}
    .note-input:focus{outline:none;border-color:var(--red);}
    .btn-note-save{padding:8px 13px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;}
    .btn-note-save:hover{background:#B02828;}
    .note-item{background:var(--page);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:8px;}
    .note-text{flex:1;font-size:13px;color:var(--text);line-height:1.5;word-break:break-word;}
    .note-time{font-size:10px;color:var(--text3);margin-top:3px;}
    .note-del{width:24px;height:24px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .note-del:hover{color:#C62828;}
    .note-done{text-decoration:line-through;color:var(--text3);}
    .note-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:12px;font-weight:700;transition:all 0.15s;}
    .note-check.checked{background:var(--red);border-color:var(--red);color:#fff;}
    .empty-notes{text-align:center;padding:2rem 0;color:var(--text3);font-size:13px;}

    /* FINANCIERO */
    .mbar-wrap{display:flex;align-items:center;gap:7px;}
    .mbar{flex:1;height:5px;border-radius:4px;background:var(--border);overflow:hidden;min-width:40px;}
    .mfill{height:100%;border-radius:4px;}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:1.5rem;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.15);}
    .modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:1rem;}
    .modal-section{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:0.7px;text-transform:uppercase;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
    .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .field label{font-size:12px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;}
    .field input{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border2);background:var(--page);font-size:13px;font-family:var(--font);color:var(--text);}
    .field input:focus{outline:none;border-color:var(--red);background:var(--white);}
    .preview-box{background:var(--page);border-radius:8px;padding:12px 14px;margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border:1px solid var(--border);}
    .pv-label{font-size:11px;color:var(--text3);font-weight:600;}
    .pv-val{font-size:14px;font-weight:800;}
    .modal-actions{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end;}
    .btn-cancel{padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;font-size:13px;cursor:pointer;font-family:var(--font);color:var(--text2);font-weight:600;}
    .btn-cancel:hover{background:var(--page);}
    .btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);font-weight:800;}
    .btn-save:hover{background:#B02828;}

    /* TOAST */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none;}
    .toast.show{opacity:1;}


    /* IMAGE UPLOAD */
    .img-upload-wrap { margin-top: 4px; }
    .img-preview { width: 100%; height: 120px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 6px; display: none; }
    .img-preview.show { display: block; }
    .btn-upload-img { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 8px; border-radius: var(--radius); border: 2px dashed var(--border2); background: var(--page); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
    .btn-upload-img:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }
    .btn-upload-img.loading { opacity: 0.6; cursor: wait; }
    .prod-card-img { width: 100%; height: 80px; object-fit: cover; border-radius: 6px; margin-bottom: 6px; }
    .prod-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }

    /* ═══════════════════════════════
       MOBILE STYLES
    ═══════════════════════════════ */
    @media (max-width: 768px) {
      /* Hide sidebar, show bottom nav */
      .sidebar { display: none !important; }
      .main { margin-left: 0 !important; padding-bottom: 70px; }

      /* Bottom navigation */
      .bottom-nav { display: flex !important; }

      /* Topbar */
      .topbar { padding: 12px 16px; }
      .tb-title { font-size: 16px; }
      .btn-new { padding: 7px 12px; font-size: 12px; }

      /* Content padding */
      .content { padding: 14px 14px; }

      /* Metrics - 2 columns on mobile */
      .metrics { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
      .mc { padding: 12px 13px; border-radius: 10px; }
      .mc-val { font-size: 18px !important; }
      .mc-label { font-size: 9px !important; }
      .mc-sub { font-size: 10px !important; }
      .mc-bg-icon { font-size: 36px !important; }

      /* Table - show only key columns on mobile */
      .hide-mobile { display: none !important; }
      table { min-width: unset !important; }
      th, td { padding: 10px 10px !important; font-size: 12px !important; }

      /* Search */
      .search-input { font-size: 14px; padding: 10px 12px 10px 34px; }

      /* Filter buttons */
      .filter-btn { padding: 4px 10px; font-size: 11px; }
      .section-header { margin-bottom: 8px; }

      /* Venta layout - single column */
      .venta-layout { grid-template-columns: 1fr !important; }
      .prod-grid { max-height: 320px; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)) !important; }
      .cart-box { position: static !important; }

      /* Pizarron */
      .pizarron-wrap { grid-template-columns: 1fr !important; }

      /* Alerts */
      .alert { font-size: 12px; }

      /* Modal */
      .modal { width: 95vw !important; padding: 1.2rem !important; }
      .field-grid { grid-template-columns: 1fr !important; }
    }

    /* Bottom Navigation Bar */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--sidebar);
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 100;
      padding: 0;
    }
    .bn-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px 12px;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      font-size: 10px;
      font-weight: 600;
      gap: 4px;
      transition: color 0.15s;
      border: none;
      background: transparent;
      font-family: var(--font);
    }
    .bn-item i { font-size: 20px; }

<script>
const SB_URL='https://feedsyibnizpwnvrfaoe.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZWRzeWlibml6cHdudnJmYW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTc4MjksImV4cCI6MjA5OTI3MzgyOX0.a4RTKsmtrBuSbG8hNpAkH5rg2jkgfKB7Z1JI4QuUIoU';
const sbHeaders={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sbGet(table){
  const r=await fetch(SB_URL+'/rest/v1/'+table+'?order=id',{headers:sbHeaders});
  return r.ok?await r.json():[];
}
async function sbUpsert(table,rows){
  await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{...sbHeaders,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(rows)});
}
async function sbDelete(table,id){
  await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sbHeaders});
}
async function sbDeleteAll(table){
  await fetch(SB_URL+'/rest/v1/'+table+'?id=gte.0',{method:'DELETE',headers:sbHeaders});
}

let products=[], nextId=1, editId=null;
let currentView='stock', stockSearch='', ventaSearch='';
let currentFilter='all';
let cart=[], ventas=[], nextVentaId=1;
let pedidos=[], nextPedidoId=1, stockNotes=[], nextStockNoteId=1;
let loading=false;
let currentImageUrl='';
let compras=[], nextCompraId=1;

const fmt=n=>'$'+Math.round(n).toLocaleString('es-AR');
const pct=n=>Math.round(n)+'%';
const getStatus=(qty,min)=>qty===0?'critical':qty<min?'low':'ok';
const getLabel=s=>({critical:'Sin stock',low:'Stock bajo',ok:'Normal'}[s]);
const getPct=(qty,min)=>!min?100:Math.min(100,Math.round((qty/(min*3))*100));
const getMargin=(c,p)=>p?((p-c)/p)*100:0;
const getMarkup=(c,p)=>c?((p-c)/c)*100:0;
const mColor=m=>m>=30?'#2E7D32':m>=15?'#E65100':'#C62828';
const nowStr=()=>{const d=new Date();return`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;};

function save(){
  // Keep local backup too
  localStorage.setItem('ds3',JSON.stringify({products,ventas,nextId,nextVentaId,pedidos,nextPedidoId,stockNotes,nextStockNoteId,compras,nextCompraId}));
}
async function sbUpsertBatch(table, rows){
  const chunkSize = 40;
  for(let i = 0; i < rows.length; i += chunkSize){
    const chunk = rows.slice(i, i + chunkSize);
    const r = await fetch(SB_URL+'/rest/v1/'+table, {
      method:'POST',
      headers:{...sbHeaders,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(chunk)
    });
    if(!r.ok){
      const err = await r.text();
      console.warn('Supabase batch error on '+table+':', err);
    }
    // Small delay between batches
    await new Promise(r=>setTimeout(r,100));
  }
}

function normalizeProducts(arr){
  return arr.map(p=>({
    id: p.id||0,
    name: p.name||'',
    cat: p.cat||'General',
    cost: Number(p.cost)||0,
    price: Number(p.price)||0,
    qty: Number(p.qty)||0,
    min: Number(p.min)||0,
    image: p.image||''
  }));
}
function normalizeVentas(arr){
  return arr.map(v=>({
    id: v.id||0,
    fecha: v.fecha||'',
    items: v.items||[],
    total: Number(v.total)||0,
    costo: Number(v.costo)||0,
    ganancia: Number(v.ganancia)||0
  }));
}
function normalizePedidos(arr){
  return arr.map(p=>({id:p.id||0,text:p.text||'',time:p.time||'',done:!!p.done}));
}
function normalizeStockNotes(arr){
  return arr.map(n=>({id:n.id||0,text:n.text||'',time:n.time||'',done:!!n.done}));
}

async function syncToSupabase(){
  try{
    await sbDeleteAll('products');
    await sbDeleteAll('ventas');
    await sbDeleteAll('pedidos');
    await sbDeleteAll('stock_notes');
    await new Promise(r=>setTimeout(r,500));
    if(products.length) await sbUpsertBatch('products', normalizeProducts(products));
    if(ventas.length) await sbUpsertBatch('ventas', normalizeVentas(ventas));
    if(pedidos.length) await sbUpsertBatch('pedidos', normalizePedidos(pedidos));
    if(stockNotes.length) await sbUpsertBatch('stock_notes', normalizeStockNotes(stockNotes));
    console.log('Supabase sync OK - products:', products.length);
  }catch(e){console.warn('Supabase sync error:',e);}
}
async function load(){
  try{
    showLoadingScreen();
    // Load from Supabase
    const [prods, vents, peds, snotes] = await Promise.all([
      sbGet('products'), sbGet('ventas'), sbGet('pedidos'), sbGet('stock_notes')
    ]);
    if(prods.length || vents.length || peds.length || snotes.length){
      products=prods; ventas=vents; pedidos=peds; stockNotes=snotes;
      nextId=products.length?Math.max(...products.map(p=>p.id))+1:1;
      nextVentaId=ventas.length?Math.max(...ventas.map(v=>v.id))+1:1;
      nextPedidoId=pedidos.length?Math.max(...pedidos.map(p=>p.id))+1:1;
      nextStockNoteId=stockNotes.length?Math.max(...stockNotes.map(n=>n.id))+1:1;
      save();
    } else {
      // Si Supabase esta vacio, intentar migrar desde localStorage
      let raw=localStorage.getItem('ds3')||localStorage.getItem('sgdata')||localStorage.getItem('ds2')||localStorage.getItem('ds_data');
      if(raw){
        const d=JSON.parse(raw);
        if(d && d.products && d.products.length){
          products=d.products||[]; ventas=d.ventas||[];
          pedidos=d.pedidos||[]; stockNotes=d.stockNotes||[];
          nextId=d.nextId||(products.length?Math.max(...products.map(p=>p.id))+1:1);
          nextVentaId=d.nextVentaId||(ventas.length?Math.max(...ventas.map(v=>v.id))+1:1);
          nextPedidoId=d.nextPedidoId||(pedidos.length?Math.max(...pedidos.map(p=>p.id))+1:1);
          nextStockNoteId=d.nextStockNoteId||(stockNotes.length?Math.max(...stockNotes.map(n=>n.id))+1:1);
          save();
          // Migrate to Supabase
          await syncToSupabase();
          showToast('✓ Datos migrados a la nube correctamente');
        }
      }
    }
  }catch(e){
    console.warn('Error cargando desde Supabase:',e);
    // Fallback to localStorage
    let raw=localStorage.getItem('ds3')||localStorage.getItem('sgdata');
    if(raw){const d=JSON.parse(raw);if(d){products=d.products||[];ventas=d.ventas||[];pedidos=d.pedidos||[];stockNotes=d.stockNotes||[];}}
  }
  hideLoadingScreen();
}
function showLoadingScreen(){
  let el=document.getElementById('loading-screen');
  if(!el){el=document.createElement('div');el.id='loading-screen';el.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,0.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-family:var(--font)';el.innerHTML='<div style="width:36px;height:36px;border:3px solid #eee;border-top-color:#D0312D;border-radius:50%;animation:spin 0.8s linear infinite"></div><div style="font-size:14px;font-weight:600;color:#5A6278">Cargando datos...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';document.body.appendChild(el);}
  el.style.display='flex';
}
function hideLoadingScreen(){
  const el=document.getElementById('loading-screen');
  if(el)el.style.display='none';
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function setView(v,el,source){
  currentView=v;
  // Update sidebar
  document.querySelectorAll('.sb-item').forEach(n=>n.classList.remove('active'));
  const sidebarItem = document.getElementById('nav-'+v);
  if(sidebarItem) sidebarItem.classList.add('active');
  // Update bottom nav
  document.querySelectorAll('.bn-item').forEach(n=>n.classList.remove('active'));
  const bnItem = document.getElementById('bn-'+v);
  if(bnItem) bnItem.classList.add('active');
  const titles={stock:'Stock',venta:'Registrar venta',historial:'Historial de ventas',financiero:'Análisis financiero',pizarron:'Pizarrón',compras:'Compras / Facturas'};
  document.getElementById('topbar-title').textContent=titles[v];
  document.getElementById('btn-nuevo').style.display=(v==='stock')?'flex':'none';
  render();
}
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function updateDate(){
  const now=new Date();
  const days=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('topbar-date').textContent=`${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
  document.getElementById('footer-time').textContent=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('footer-stock').textContent=fmt(products.reduce((a,p)=>a+p.price*p.qty,0));
}

function render(){updateDate();if(currentView==='stock')renderStock();else if(currentView==='venta')renderVenta();else if(currentView==='historial')renderHistorial();else if(currentView==='financiero')renderFinanciero();else if(currentView==='compras')renderCompras();else renderPizarron();}

function renderStock(){
  const q=stockSearch.toLowerCase();
  const all=q?products.filter(p=>p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)):products;
  const filtered=currentFilter==='all'?all:all.filter(p=>getStatus(p.qty,p.min)===currentFilter);
  const crit=products.filter(p=>getStatus(p.qty,p.min)==='critical');
  const low=products.filter(p=>getStatus(p.qty,p.min)==='low');
  const tc=products.reduce((a,p)=>a+p.cost*p.qty,0);
  const ts=products.reduce((a,p)=>a+p.price*p.qty,0);
  let alerts='';
  if(crit.length)alerts+=`<div class="alert a-red"><i class="ti ti-alert-circle" style="font-size:17px;flex-shrink:0"></i>Sin stock: ${crit.map(p=>`<strong>${p.name}</strong>`).join(', ')}. Reponer urgente.</div>`;
  if(low.length)alerts+=`<div class="alert a-orange"><i class="ti ti-alert-triangle" style="font-size:17px;flex-shrink:0"></i>Stock bajo: ${low.map(p=>`<strong>${p.name}</strong>`).join(', ')}.</div>`;

  document.getElementById('view-area').innerHTML=`
    <div class="metrics">
      <div class="mc mc-navy"><i class="ti ti-package mc-bg-icon"></i><div class="mc-label">Productos</div><div class="mc-val">${products.length}</div><div class="mc-sub">en inventario</div></div>
      <div class="mc mc-blue"><i class="ti ti-coin mc-bg-icon"></i><div class="mc-label">Valor stock costo</div><div class="mc-val">${fmt(tc)}</div><div class="mc-sub">inversión</div></div>
      <div class="mc mc-green"><i class="ti ti-trending-up mc-bg-icon"></i><div class="mc-label">Valor stock venta</div><div class="mc-val">${fmt(ts)}</div><div class="mc-sub">potencial</div></div>
      <div class="mc mc-orange"><i class="ti ti-alert-triangle mc-bg-icon"></i><div class="mc-label">Stock bajo</div><div class="mc-val">${low.length}</div><div class="mc-sub">productos</div></div>
      <div class="mc mc-red"><i class="ti ti-circle-x mc-bg-icon"></i><div class="mc-label">Sin stock</div><div class="mc-val">${crit.length}</div><div class="mc-sub">crítico</div></div>
    </div>
    <div class="alert-area">${alerts}</div>
    <div class="section-header">
      <div class="section-title">Inventario</div>
      <div class="filter-row">
        ${['all','critical','low','ok'].map((f,i)=>`<button class="filter-btn ${currentFilter===f?'active':''}" onclick="setFilter('${f}',this)">${['Todos','Crítico','Bajo','Normal'][i]}</button>`).join('')}
      </div>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search search-icon" aria-hidden="true"></i>
      <input class="search-input" id="stock-search-input" placeholder="Buscar producto o categoría..." />
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Producto</th><th>Costo</th><th>Venta</th><th>Margen</th><th>Cant.</th><th class="hide-mobile">Nivel</th><th class="hide-mobile">Estado</th><th></th></tr></thead>
      <tbody>${filtered.length===0?`<tr><td colspan="8" class="empty">${products.length===0?'Agregá tu primer producto.':'Sin resultados.'}</td></tr>`:filtered.map(p=>{
        const s=getStatus(p.qty,p.min);const pp=getPct(p.qty,p.min);const m=getMargin(p.cost,p.price);
        const qc=s==='critical'?'#C62828':s==='low'?'#E65100':'var(--text)';
        return`<tr>
          <td><div style="display:flex;align-items:center;gap:8px">${p.image?`<img src="${p.image}" class="prod-thumb" onerror="this.style.display='none'" />`:'<div style="width:36px;flex-shrink:0"></div>'}<div><div class="prod-name">${p.name}</div><div class="prod-cat">${p.cat}</div></div></div></td>
          <td style="color:var(--text2)">${fmt(p.cost)}</td>
          <td style="font-weight:700">${fmt(p.price)}</td>
          <td><span style="font-size:12px;font-weight:700;color:${mColor(m)}">${pct(m)}</span></td>
          <td><span style="font-weight:800;font-size:17px;color:${qc}">${p.qty}</span></td>
          <td class="hide-mobile" style="min-width:80px"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">${pp}%</div><div class="progress-bar"><div class="${s==='ok'?'pf-ok':s==='low'?'pf-low':'pf-crit'}" style="width:${pp}%"></div></div></td>
          <td class="hide-mobile"><span class="badge ${s==='ok'?'b-ok':s==='low'?'b-low':'b-crit'}"><span class="dot ${s==='ok'?'d-ok':s==='low'?'d-low':'d-crit'}"></span>${getLabel(s)}</span></td>
          <td><div class="actions-col">
            <button class="icon-btn" onclick="openEditModal(${p.id})" title="Editar"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="icon-btn del" onclick="deleteProduct(${p.id})" title="Eliminar"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </div></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  const si=document.getElementById('stock-search-input');
  if(si){
    si.value=stockSearch;
    si.addEventListener('input',function(){
      stockSearch=this.value;
      renderStockTable();
    });
    si.focus();
    si.setSelectionRange(si.value.length, si.value.length);
  }
}

function renderStockTable(){
  const q=stockSearch.toLowerCase();
  const all=q?products.filter(p=>p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)):products;
  const filtered=currentFilter==='all'?all:all.filter(p=>getStatus(p.qty,p.min)===currentFilter);
  const tbody=document.querySelector('#view-area .table-wrap tbody');
  if(!tbody)return;
  tbody.innerHTML=filtered.length===0?`<tr><td colspan="8" class="empty">${products.length===0?'Agregá tu primer producto.':'Sin resultados.'}</td></tr>`:filtered.map(p=>{
    const s=getStatus(p.qty,p.min);const pp=getPct(p.qty,p.min);const m=getMargin(p.cost,p.price);
    const qc=s==='critical'?'#C62828':s==='low'?'#E65100':'var(--text)';
    return`<tr>
      <td><div class="prod-name">${p.name}</div><div class="prod-cat">${p.cat}</div></td>
      <td style="color:var(--text2)">${fmt(p.cost)}</td>
      <td style="font-weight:700">${fmt(p.price)}</td>
      <td><span style="font-size:12px;font-weight:700;color:${mColor(m)}">${pct(m)}</span></td>

function addToCart(id){const p=products.find(x=>x.id===id);if(!p||p.qty===0)return;const ic=cart.find(c=>c.id===id);if(ic){if(ic.qty<p.qty)ic.qty++;else{showToast('No hay más stock');return;}}else cart.push({id:p.id,name:p.name,price:p.price,cost:p.cost,qty:1});renderVenta();}
function changeQty(id,delta){const item=cart.find(c=>c.id===id);const prod=products.find(p=>p.id===id);if(!item)return;item.qty+=delta;if(item.qty>prod.qty){item.qty=prod.qty;showToast('Límite de stock');}if(item.qty<=0)cart=cart.filter(c=>c.id!==id);renderVenta();}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);renderVenta();}
async function confirmarVenta(){if(!cart.length)return;const v={id:nextVentaId++,fecha:new Date().toISOString(),items:cart.map(i=>({...i})),total:cart.reduce((a,i)=>a+i.price*i.qty,0),costo:cart.reduce((a,i)=>a+i.cost*i.qty,0),ganancia:cart.reduce((a,i)=>a+(i.price-i.cost)*i.qty,0)};ventas.unshift(v);cart.forEach(i=>{const p=products.find(x=>x.id===i.id);if(p)p.qty=Math.max(0,p.qty-i.qty);});cart=[];save();await syncToSupabase();showToast(`✓ Venta #${v.id} — ${fmt(v.total)}`);renderVenta();}

async function handleImageUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const label = document.getElementById('img-upload-label');
  const text = document.getElementById('img-upload-text');
  const preview = document.getElementById('img-preview');
  label.classList.add('loading');
  text.textContent = 'Subiendo...';
  try {
    const ext = file.name.split('.').pop();
    const fileName = 'prod_' + Date.now() + '.' + ext;
    const res = await fetch(SB_URL + '/storage/v1/object/productos/' + fileName, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': file.type, 'x-upsert': 'true' },
      body: file
    });
    if(res.ok){
      currentImageUrl = SB_URL + '/storage/v1/object/public/productos/' + fileName;
      preview.src = currentImageUrl;
      preview.classList.add('show');
      text.textContent = 'Cambiar foto';
      showToast('✓ Foto subida');
    } else {
      showToast('Error al subir la foto');
      text.textContent = 'Subir foto';
    }
  } catch(err) {
    showToast('Error al subir la foto');
    text.textContent = 'Subir foto';
  }
  label.classList.remove('loading');
}

async function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value.trim()||'General';
  const cost=parseFloat(document.getElementById('f-cost').value)||0;
  const price=parseFloat(document.getElementById('f-price').value)||0;
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  const min=parseInt(document.getElementById('f-min').value)||0;

}

function exportBackup(){
  const data = JSON.stringify({products,ventas,nextId,nextVentaId,pedidos,nextPedidoId,stockNotes,nextStockNoteId}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const now = new Date();
  a.download = `backup-donstefano-${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}.json`;
  a.click();
  showToast('✓ Backup descargado');
}
function importBackup(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(ev){
    try{
      const d = JSON.parse(ev.target.result);
      if(!d.products) throw new Error('Archivo inválido');
      products = d.products || [];
      ventas = d.ventas || [];
      nextId = d.nextId || (products.length ? Math.max(...products.map(p=>p.id))+1 : 1);
      nextVentaId = d.nextVentaId || (ventas.length ? Math.max(...ventas.map(v=>v.id))+1 : 1);
      pedidos = d.pedidos || [];
      nextPedidoId = d.nextPedidoId || 1;
      stockNotes = d.stockNotes || [];
      nextStockNoteId = d.nextStockNoteId || 1;
      compras = d.compras || [];
      nextCompraId = d.nextCompraId || 1;
      save();
      showToast('Subiendo datos a la nube...');
      await syncToSupabase();
      render();
      showToast('✓ Datos importados y sincronizados a la nube');
    }catch(err){ alert('Error al importar: archivo inválido'); }
  };
  reader.readAsText(file);
}

    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();

  const totalAll=compras.reduce((a,c)=>a+c.monto,0);

  document.getElementById('view-area').innerHTML=`
    <div class="metrics">
      <div class="mc mc-red"><i class="ti ti-receipt mc-bg-icon"></i><div class="mc-label">Total compras</div><div class="mc-val">${compras.length}</div><div class="mc-sub">facturas</div></div>
      <div class="mc mc-orange"><i class="ti ti-coin mc-bg-icon"></i><div class="mc-label">Gastado este mes</div><div class="mc-val">${fmt(totalMes)}</div></div>
      <div class="mc mc-navy"><i class="ti ti-chart-bar mc-bg-icon"></i><div class="mc-label">Gasto total</div><div class="mc-val">${fmt(totalAll)}</div></div>
    </div>
    <div class="compra-form">
      <div class="compra-form-title"><i class="ti ti-plus" aria-hidden="true"></i> Nueva compra / factura</div>
      <div class="compra-fields">
        <div class="compra-field"><label>Proveedor</label><input type="text" id="cp-proveedor" placeholder="Ej: Distribuidora Norte" /></div>
        <div class="compra-field"><label>Monto total ($)</label><input type="number" id="cp-monto" placeholder="0" min="0" /></div>
        <div class="compra-field"><label>Fecha</label><input type="date" id="cp-fecha" value="${new Date().toISOString().split('T')[0]}" /></div>
        <div class="compra-field"><label>Notas (opcional)</label><input type="text" id="cp-nota" placeholder="Ej: Factura B N°00123" /></div>
      </div>
      <img id="cp-img-preview" class="img-factura-preview" src="" alt="Preview factura" />
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <label class="btn-upload-img" id="cp-img-label" style="flex:1;min-width:140px;">
          <i class="ti ti-camera" aria-hidden="true"></i>
          <span id="cp-img-text">Foto de la factura</span>
          <input type="file" id="cp-img-input" accept="image/*" style="display:none" onchange="handleFacturaUpload(event)" />
        </label>
        <button class="btn-guardar-compra" onclick="guardarCompra()"><i class="ti ti-check" aria-hidden="true"></i> Guardar compra</button>
      </div>
    </div>
    <div class="section-title" style="margin-bottom:12px">Historial de compras</div>
    ${compras.length===0?'<div class="no-compras">No hay compras registradas todavía.</div>':
      compras.map(c=>{
        const d=new Date(c.fecha);
        const ds=`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        return`<div class="compra-item">
          <div class="compra-header">
            <div style="display:flex;align-items:flex-start;gap:10px">
              ${c.imagen?`<img src="${c.imagen}" class="compra-img-thumb" onclick="openLightbox('${c.imagen}')" onerror="this.style.display='none'" />`:''}
              <div>
                <div class="compra-proveedor">${c.proveedor}</div>
                <div class="compra-fecha">${ds}</div>
                ${c.nota?`<div class="compra-nota">${c.nota}</div>`:''}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="compra-monto">${fmt(c.monto)}</div>
              <button class="icon-btn del" onclick="deleteCompra(${c.id})" title="Eliminar"><i class="ti ti-trash" aria-hidden="true"></i></button>
            </div>
          </div>
          ${c.imagen?`<button onclick="openLightbox('${c.imagen}')" style="display:flex;align-items:center;gap:5px;margin-top:8px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--page);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);"><i class='ti ti-photo' style='font-size:14px'></i> Ver factura</button>`:''}
        </div>`;
      }).join('')}
  `;
}

let currentFacturaUrl='';
async function handleFacturaUpload(e){
  const file=e.target.files[0];if(!file)return;
  const label=document.getElementById('cp-img-label');
  const text=document.getElementById('cp-img-text');
  const preview=document.getElementById('cp-img-preview');
  label.classList.add('loading');text.textContent='Subiendo...';
  try{
    const ext=file.name.split('.').pop();
    const fileName='factura_'+Date.now()+'.'+ext;
    const res=await fetch(SB_URL+'/storage/v1/object/productos/'+fileName,{
      method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},body:file
    });
    if(res.ok){
      currentFacturaUrl=SB_URL+'/storage/v1/object/public/productos/'+fileName;
      preview.src=currentFacturaUrl;preview.classList.add('show');
      text.textContent='Cambiar foto';showToast('✓ Foto subida');
    }else{showToast('Error al subir');text.textContent='Foto de la factura';}
  }catch(err){showToast('Error al subir');text.textContent='Foto de la factura';}
  label.classList.remove('loading');
}

async function guardarCompra(){
  const proveedor=document.getElementById('cp-proveedor').value.trim();
  const monto=parseFloat(document.getElementById('cp-monto').value)||0;
  const fecha=document.getElementById('cp-fecha').value||new Date().toISOString().split('T')[0];
  const nota=document.getElementById('cp-nota').value.trim();
  if(!proveedor){document.getElementById('cp-proveedor').focus();return;}
  const compra={id:nextCompraId++,proveedor,monto,fecha,nota,imagen:currentFacturaUrl};
  compras.unshift(compra);
  currentFacturaUrl='';
  save();
  showToast('✓ Compra registrada');
  renderCompras();
  // close lightbox if open
  closeLightbox();
}

function deleteCompra(id){
  if(!confirm('¿Eliminar esta compra?'))return;
  compras=compras.filter(c=>c.id!==id);save();renderCompras();showToast('Compra eliminada');
}

function closeLightbox(){
  const lb=document.getElementById('lightbox');
  if(lb){lb.classList.remove('open');lb.style.display='none';}
}
function openLightbox(src){
  let lb=document.getElementById('lightbox');
  if(!lb){
    lb=document.createElement('div');lb.className='lightbox';lb.id='lightbox';
    lb.innerHTML='<button class="lightbox-close" onclick="closeLightbox()"><i class="ti ti-x"></i></button><img id="lightbox-img" src="" />';
    lb.onclick=function(e){if(e.target===lb)closeLightbox();};
    document.body.appendChild(lb);
  }
  document.getElementById('lightbox-img').src=src;
  lb.style.display='flex';
  lb.classList.add('open');
}

(async()=>{ await load(); render(); })();
setInterval(updateDate,30000);
</script>
